<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맞은편 차량 피하기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="dark">
  <div id="app">
    <header class="top-bar">
      <div class="top-bar-inner">
        <h1 class="title">맞은편 차량 피하기</h1>
        <div class="top-actions">
          <label class="theme-label">
            <span class="sr-only">화면 테마</span>
            <select id="theme-select" aria-label="화면 테마">
              <option value="dark">검은색</option>
              <option value="light">흰색</option>
              <option value="gray">회색</option>
            </select>
          </label>
          <button type="button" id="share-btn" class="button-inline">공유하기</button>
        </div>
      </div>
      <p class="hint">← → 로 이동 · 장애물을 피하세요 · 시간이 지날수록 난이도·레벨 상승</p>
      <div class="personal-bar" id="personal-bar" aria-live="polite">
        <span>내 최고 점수 <strong id="personal-best-score">0</strong></span>
        <span class="personal-sep">·</span>
        <span>내 최고 레벨 <strong id="personal-best-level">1</strong></span>
      </div>
    </header>

    <section class="panel identity-panel">
      <h2 class="section-title">이름 · 대결</h2>
      <div class="identity-grid">
        <label class="field">
          <span>내 이름</span>
          <input type="text" id="my-name" maxlength="24" placeholder="닉네임 입력" autocomplete="nickname" />
        </label>
        <div class="identity-actions">
          <button type="button" id="create-room-btn" class="button secondary">대결 방 만들기</button>
          <span id="room-label" class="room-label" aria-live="polite"></span>
        </div>
      </div>
      <p id="duel-hint" class="duel-hint small"></p>
      <div id="join-banner" class="join-banner hidden">
        <p><strong>친구가 만든 방</strong>에 참가합니다. 이름을 입력한 뒤 참가를 누르세요.</p>
        <div class="join-row">
          <input type="text" id="join-name" maxlength="24" placeholder="내 이름" />
          <button type="button" id="join-btn" class="button primary">참가하기</button>
        </div>
      </div>
      <div id="duel-board" class="duel-board hidden">
        <h3 class="duel-board-title">방 랭킹 (최고 점수 · 최고 레벨)</h3>
        <div class="duel-list-head" aria-hidden="true">
          <span>#</span><span>이름</span><span>점수</span><span>레벨</span>
        </div>
        <ul id="duel-list" class="duel-list duel-list-grid"></ul>
      </div>
    </section>

    <section id="select-screen" class="panel">
      <h2>운전할 차량 선택 (3대 중 1대)</h2>
      <div class="car-picks" role="group" aria-label="차량 선택">
        <button type="button" class="car-option" data-car="0" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="0"></canvas>
          <span>빨강</span>
        </button>
        <button type="button" class="car-option" data-car="1" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="1"></canvas>
          <span>파랑</span>
        </button>
        <button type="button" class="car-option" data-car="2" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="2"></canvas>
          <span>초록</span>
        </button>
      </div>
      <button id="start-btn" type="button" class="button primary" disabled>게임 시작</button>
    </section>

    <section id="game-screen" class="panel hidden">
      <div class="game-wrap">
        <canvas id="game" width="420" height="640" tabindex="0" aria-label="게임 화면"></canvas>
        <div id="overlay" class="overlay hidden">
          <p id="overlay-title" class="overlay-title"></p>
          <p id="overlay-score" class="overlay-score"></p>
          <button id="restart-btn" type="button" class="button primary">다시 선택</button>
        </div>
      </div>
      <div class="touch-pad" id="touch-pad">
        <button type="button" class="touch-btn" id="touch-left" aria-label="왼쪽 차선으로">◀</button>
        <button type="button" class="touch-btn" id="touch-right" aria-label="오른쪽 차선으로">▶</button>
      </div>
      <div class="status">
        <span>점수 <strong id="score">0</strong></span>
        <span>레벨 <strong id="level">1</strong></span>
      </div>
    </section>
  </div>

  <div id="share-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="share-backdrop"></div>
    <div class="modal-card" role="dialog" aria-labelledby="share-modal-title">
      <h2 id="share-modal-title" class="modal-title">QR로 공유</h2>
      <p id="share-modal-desc" class="modal-desc">스마트폰으로 찍으면 같은 페이지로 이동합니다.</p>
      <div id="qrcode-host" class="qrcode-host"></div>
      <p class="share-url-wrap">
        <code id="share-url-text" class="share-url-text"></code>
      </p>
      <div class="modal-actions">
        <button type="button" id="copy-link-btn" class="button secondary">링크 복사</button>
        <button type="button" id="close-share-btn" class="button primary">닫기</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="game.js"></script>
</body>
</html>
