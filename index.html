<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맞은편 차량 피하기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="hud">
      <h1>맞은편 차량 피하기</h1>
      <p class="hint">← → 로 이동 · 장애물을 피하세요</p>
    </header>

    <section id="select-screen" class="panel">
      <h2>운전할 차량 선택 (3대 중 1대)</h2>
      <div class="car-picks" role="group" aria-label="차량 선택">
        <button type="button" class="car-option" data-car="0" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="0"></canvas>
          <span>빨강</span>
        </button>
        <button type="button" class="car-option" data-car="1" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="1"></canvas>
          <span>파랑</span>
        </button>
        <button type="button" class="car-option" data-car="2" aria-pressed="false">
          <canvas class="preview" width="72" height="96" data-preview="2"></canvas>
          <span>초록</span>
        </button>
      </div>
      <button id="start-btn" type="button" class="button primary" disabled>게임 시작</button>
    </section>

    <section id="game-screen" class="panel hidden">
      <div class="game-wrap">
        <canvas id="game" width="420" height="640" tabindex="0" aria-label="게임 화면"></canvas>
        <div id="overlay" class="overlay hidden">
          <p id="overlay-title" class="overlay-title"></p>
          <p id="overlay-score" class="overlay-score"></p>
          <button id="restart-btn" type="button" class="button primary">다시 선택</button>
        </div>
      </div>
      <div class="status">
        <span>점수: <strong id="score">0</strong></span>
        <span>최고: <strong id="best">0</strong></span>
      </div>
    </section>
  </div>
  <script src="game.js"></script>
</body>
</html>
